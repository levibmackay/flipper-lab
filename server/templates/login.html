{% extends "base.html" %}
{% block content %}
<div class="box">
  <h2>Login</h2>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <label>Username</label>
    <input name="username" type="text" autocomplete="off">
    <label>Password</label>
    <input name="password" type="password">
    <button type="submit">Login</button>
  </form>
</div>
{% endblock %}
